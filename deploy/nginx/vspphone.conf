# =============================================================================
# VSP Phone — Production Nginx reverse proxy
# Install path: /etc/nginx/sites-available/vspphone.conf
#
#   sudo cp /opt/vsp-voip/deploy/nginx/vspphone.conf /etc/nginx/sites-available/vspphone.conf
#   sudo ln -sf /etc/nginx/sites-available/vspphone.conf /etc/nginx/sites-enabled/vspphone.conf
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Prerequisites:
#   - Let's Encrypt cert: /etc/letsencrypt/live/vspphone.com/
#   - API (Docker) on 127.0.0.1:3000
#   - Next.js portal on 127.0.0.1:3001
#   - Landing static files: /opt/vsp-voip/landing/
#   - DNS A records: vspphone.com, www, api, app, admin → server IP
# =============================================================================

# WebSocket upgrade map (use $connection_upgrade in proxy blocks)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Optional rate limit for public API (Telnyx webhook bursts)
limit_req_zone $binary_remote_addr zone=vsp_api_limit:10m rate=30r/s;

# =============================================================================
# HTTP → HTTPS
# =============================================================================

# Apex + subdomains (preserve host on redirect, except www → apex)
server {
    listen 80;
    listen [::]:80;
    server_name api.vspphone.com app.vspphone.com admin.vspphone.com vspphone.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# www → apex (HTTP)
server {
    listen 80;
    listen [::]:80;
    server_name www.vspphone.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://vspphone.com$request_uri;
    }
}

# =============================================================================
# HTTPS — www redirect to apex
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.vspphone.com;

    ssl_certificate     /etc/letsencrypt/live/vspphone.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vspphone.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://vspphone.com$request_uri;
}

# =============================================================================
# HTTPS — Landing page (vspphone.com)
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vspphone.com;

    ssl_certificate     /etc/letsencrypt/live/vspphone.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vspphone.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/vsp-voip/landing;
    index index.html;

    # Security headers (static site)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Android APK download (optional — copy release APK here after build)
    location /apk/ {
        alias /opt/vsp-voip/mobile/build/app/outputs/flutter-apk/;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="vsp-phone.apk"';
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

# =============================================================================
# HTTPS — Backend API (api.vspphone.com → 127.0.0.1:3000)
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.vspphone.com;

    ssl_certificate     /etc/letsencrypt/live/vspphone.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vspphone.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    # Telnyx Call Control / voice webhooks — no rate limit (burst traffic during calls)
    location /webhook {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location / {
        limit_req zone=vsp_api_limit burst=60 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket (if ever used on API)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Client / proxy identity
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # JWT Bearer tokens (web portal + mobile app)
        proxy_set_header Authorization $http_authorization;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}

# =============================================================================
# HTTPS — Tenant portal (app.vspphone.com → 127.0.0.1:3001)
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.vspphone.com;

    ssl_certificate     /etc/letsencrypt/live/vspphone.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vspphone.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket (Next.js dev HMR / any WS endpoints)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Authorization $http_authorization;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# =============================================================================
# HTTPS — Super admin portal (admin.vspphone.com → 127.0.0.1:3001)
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.vspphone.com;

    ssl_certificate     /etc/letsencrypt/live/vspphone.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vspphone.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Authorization $http_authorization;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
