services:
  api:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Override .env localhost values — inside Docker, use Compose service names.
      DATABASE_URL: postgresql://vsp:vsp@postgres:5432/vsp_voip
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  telephony-v3-worker:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://vsp:vsp@postgres:5432/vsp_voip
      REDIS_URL: redis://redis:6379
      V3_WORKER_ID: ${V3_WORKER_ID:-worker-compose-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_healthy
    entrypoint: []
    command: ["node", "scripts/telephony-v3-worker.js"]
    healthcheck:
      test: ["CMD", "node", "scripts/v3-worker-healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vsp
      POSTGRES_PASSWORD: vsp
      POSTGRES_DB: vsp_voip
    # Localhost-only on host; containers reach postgres via service name `postgres`.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vsp -d vsp_voip"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Localhost-only on host; containers reach redis via service name `redis`.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
