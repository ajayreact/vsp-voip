name: vsp_voip_mobile
description: VSP-VOIP tenant mobile app — consumes the Express REST API.
publish_to: 'none'
version: 1.0.0-beta.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  go_router: ^14.6.2
  intl: ^0.20.2
  url_launcher: ^6.3.1
  just_audio: ^0.9.46
  telnyx_webrtc: ^4.2.0
  flutter_webrtc: ^1.5.2
  permission_handler: ^12.0.3
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_callkit_incoming: ^2.5.8
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  device_info_plus: ^11.2.0
  package_info_plus: ^8.1.2
  mobile_scanner: ^6.0.2
  flutter_local_notifications: ^18.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
