name: QA Automation

on:
  pull_request:
    branches: [main, master, development, development/v2]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://vsp:vsp@localhost:5432/vsp_voip_test
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: ci-qa-automation-secret
  TELNYX_API_KEY: test-key-for-ci
  NODE_ENV: test
  API_BASE: http://localhost:3000

jobs:
  validate-framework:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/validate-tests-framework.js

  api-tests:
    runs-on: ubuntu-latest
    needs: validate-framework
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vsp
          POSTGRES_PASSWORD: vsp
          POSTGRES_DB: vsp_voip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vsp -d vsp_voip_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - name: Start API
        run: |
          node -e "require('./server.js')" &
          sleep 10
          curl -sf http://localhost:3000/health
      - name: Vitest (unit + API + mobile components)
        run: npx vitest run --config vitest.config.ts
      - name: Deploy smoke
        run: node scripts/smoke-deploy.js
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-test-reports
          path: reports/

  web-build:
    runs-on: ubuntu-latest
    needs: validate-framework
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  mobile-typecheck:
    runs-on: ubuntu-latest
    needs: validate-framework
    defaults:
      run:
        working-directory: mobile-rn
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile-rn/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  playwright:
    runs-on: ubuntu-latest
    needs: [api-tests, web-build]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vsp
          POSTGRES_PASSWORD: vsp
          POSTGRES_DB: vsp_voip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vsp -d vsp_voip_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://vsp:vsp@localhost:5432/vsp_voip_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-qa-automation-secret
      TELNYX_API_KEY: test-key-for-ci
      NODE_ENV: test
      API_BASE: http://localhost:3000
      WEB_BASE: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:3000
      QA_BROWSER_TESTS: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Start API
        run: |
          node -e "require('./server.js')" &
          sleep 8
      - name: Build and start web
        working-directory: web
        run: |
          npm ci
          npm run build
          npm run start &
          sleep 15
          curl -sf http://localhost:3001/login || curl -sf http://localhost:3001/
      - name: Playwright portal tests
        run: npx playwright test --config tests/playwright.config.ts
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/playwright-html/

  k6-messaging-smoke:
    runs-on: ubuntu-latest
    needs: api-tests
    if: github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vsp
          POSTGRES_PASSWORD: vsp
          POSTGRES_DB: vsp_voip_test
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://vsp:vsp@localhost:5432/vsp_voip_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-qa-automation-secret
      TELNYX_API_KEY: test-key-for-ci
      NODE_ENV: test
      API_BASE: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Start API
        run: |
          node -e "require('./server.js')" &
          sleep 10
      - name: k6 messaging smoke
        run: k6 run tests/performance/k6-messaging-smoke.js
