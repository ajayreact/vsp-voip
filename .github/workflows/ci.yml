name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vsp
          POSTGRES_PASSWORD: vsp
          POSTGRES_DB: vsp_voip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vsp -d vsp_voip_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://vsp:vsp@localhost:5432/vsp_voip_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      TELNYX_API_KEY: test-key
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: node -e "require('./lib/env').validateEnv(); console.log('env ok')"
      - run: node -e "require('./server.js')" &
        timeout-minutes: 1
      - name: Health check
        run: |
          sleep 5
          curl -sf http://localhost:3000/health
          curl -sf http://localhost:3000/ready || true

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
